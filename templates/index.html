<!DOCTYPE html>
<html>
<head>

<title>Biblia AI Voice Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0f172a;
font-family:Inter;
color:white;
margin:0;
}

header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1f2937;
}

.container{
display:flex;
height:92vh;
}

.sidebar{
width:260px;
background:#111827;
padding:20px;
overflow:auto;
}

.voice{
padding:12px;
border-radius:10px;
background:#1f2937;
margin-bottom:10px;
cursor:pointer;
}

.voice:hover{
background:#374151;
}

.main{
flex:1;
padding:40px;
max-width:900px;
overflow:auto;
}

textarea{
width:100%;
height:140px;
background:#1e293b;
border:none;
border-radius:10px;
padding:15px;
color:white;
font-size:16px;
margin-top:15px;
}

button{
background:#6366f1;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-size:16px;
margin-top:20px;
cursor:pointer;
margin-right:10px;
}

audio{
margin-top:20px;
width:100%;
}

</style>

</head>

<body>

<header>
Biblia AI Voice Studio
</header>

<div class="container">

<div class="sidebar">

<h3>Voices</h3>

<div id="voices"></div>

<div>

<input type="file" id="voiceUpload">
<button onclick="uploadVoice()">Upload Voice</button>

</div>

</div>

<div class="main">

<h2>Generate Verse</h2>

<textarea id="text"></textarea>

<button onclick="generate()">Generate</button>

<audio id="player" controls></audio>

<hr>

<h2>Biblical AI Chat</h2>

<input id="chatInput" placeholder="Ask something about the Bible">

<button onclick="chat()">Ask</button>

<div id="chatResponse"></div>

<audio id="chatPlayer" controls></audio>

<hr>

<h2>Dynamic Reading</h2>

<textarea id="readingText" placeholder="Paste verses"></textarea>

<button onclick="dynamicReading()">Read</button>

<audio id="readingPlayer" controls></audio>

</div>

</div>

<script>

let selectedVoice="default"

async function loadVoices(){

let res=await fetch("/voices")
let data=await res.json()

let container=document.getElementById("voices")
container.innerHTML=""

data.forEach(v=>{

let div=document.createElement("div")
div.className="voice"
div.innerText=v

div.onclick=()=>{

selectedVoice=v

}

container.appendChild(div)

})

}

async function generate(){

let text=document.getElementById("text").value

let res=await fetch("/stream?voice="+selectedVoice+"&text="+encodeURIComponent(text))

let data=await res.json()

let player=document.getElementById("player")

player.src=data.audio_file

player.play()

}

async function chat(){

let msg=document.getElementById("chatInput").value

let res=await fetch("/ai-chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:msg,
voice:selectedVoice

})

})

let data=await res.json()

document.getElementById("chatResponse").innerText=data.text

document.getElementById("chatPlayer").src=data.audio_url

}

async function dynamicReading(){

let verses=document.getElementById("readingText").value.split("\n")

let res=await fetch("/dynamic-reading",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

bible:"RVR1960",
voice:selectedVoice,
language:"es",
verses:verses

})

})

let data=await res.json()

document.getElementById("readingPlayer").src=data.audio_url

}

async function uploadVoice(){

let file=document.getElementById("voiceUpload").files[0]

let form=new FormData()

form.append("file",file)

await fetch("/clone",{

method:"POST",
body:form

})

loadVoices()

}

loadVoices()

</script>

</body>
</html>
