<!DOCTYPE html>
<html>
<head>

<title>Biblia AI Voice Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
background:#0f172a;
font-family:Inter;
color:white;
margin:0;
}

header{
padding:20px;
font-size:22px;
font-weight:600;
border-bottom:1px solid #1f2937;
}

.container{
display:flex;
height:92vh;
}

.sidebar{
width:260px;
background:#111827;
padding:20px;
overflow:auto;
}

.voice{
padding:12px;
border-radius:10px;
background:#1f2937;
margin-bottom:10px;
cursor:pointer;
}

.voice:hover{
background:#374151;
}

.main{
flex:1;
padding:40px;
max-width:900px;
}

input,select{
background:#1e293b;
border:none;
border-radius:8px;
padding:10px;
color:white;
margin-right:10px;
margin-top:10px;
}

textarea{
width:100%;
height:140px;
background:#1e293b;
border:none;
border-radius:10px;
padding:15px;
color:white;
font-size:16px;
margin-top:15px;
}

button{
background:#6366f1;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-size:16px;
margin-top:20px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#4f46e5;
}

audio{
margin-top:30px;
width:100%;
}

.status{
margin-top:15px;
color:#9ca3af;
}

.upload{
margin-top:30px;
}

</style>

</head>

<body>

<header>

Biblia AI Voice Studio

</header>

<div class="container">

<div class="sidebar">

<h3>Voices</h3>

<div id="voices"></div>

<div class="upload">

<input type="file" id="voiceUpload">

<button onclick="uploadVoice()">Upload Voice</button>

</div>

</div>

<div class="main">

<h2>Generate Verse</h2>

<div>

<select id="bible">

<option value="RVR1960">Reina Valera</option>
<option value="KJV">King James</option>

</select>

<input id="book" placeholder="Book">

<input id="chapter" placeholder="Chapter" type="number">

<input id="verse" placeholder="Verse" type="number">

</div>

<textarea id="text" placeholder="Verse text"></textarea>

<br>

<button onclick="generate()">Generate</button>

<button onclick="generateChapter()">Generate Chapter</button>

<div class="status" id="status"></div>

<audio id="player" controls></audio>

</div>

</div>

<script>

let selectedVoice="default"

async function loadVoices(){

let res=await fetch("/voices")

let data=await res.json()

let container=document.getElementById("voices")

container.innerHTML=""

data.forEach(v=>{

let div=document.createElement("div")

div.className="voice"

div.innerText=v

div.onclick=()=>{

selectedVoice=v

}

container.appendChild(div)

})

}

async function generate(){

let status=document.getElementById("status")

status.innerText="Generating..."

let text=document.getElementById("text").value

let bible=document.getElementById("bible").value
let book=document.getElementById("book").value
let chapter=document.getElementById("chapter").value
let verse=document.getElementById("verse").value

let res=await fetch("/verse-audio",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

bible:bible,
book:book,
chapter:parseInt(chapter),
verse:parseInt(verse),
voice:selectedVoice,
language:"es",
text:text

})

})

let data=await res.json()

let player=document.getElementById("player")

player.src=data.audio_url

if(data.cached){

status.innerText="Loaded from cache"

}else{

status.innerText="Generated new audio"

}

}

async function generateChapter(){

let status=document.getElementById("status")

status.innerText="Generating chapter..."

let bible=document.getElementById("bible").value
let book=document.getElementById("book").value
let chapter=document.getElementById("chapter").value
let text=document.getElementById("text").value

let verses=text.split("\n")

let payload={
bible:bible,
book:book,
chapter:parseInt(chapter),
voice:selectedVoice,
language:"es",
verses:[]
}

verses.forEach((v,i)=>{

payload.verses.push({

verse:i+1,
text:v

})

})

await fetch("/generate-chapter",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(payload)

})

status.innerText="Chapter generated"

}

async function uploadVoice(){

let file=document.getElementById("voiceUpload").files[0]

let form=new FormData()

form.append("file",file)

await fetch("/clone",{

method:"POST",
body:form

})

loadVoices()

}

loadVoices()

</script>

</body>

</html>
